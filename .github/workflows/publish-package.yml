name: PyPI publish

on:
  push:
    branches:
      - stereo
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: pypi-publish-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and validate package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine packaging

      - name: Validate prerelease version on stereo branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/stereo'
        run: |
          python - <<'PY'
          import tomllib
          from packaging.version import Version

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          version = data["project"]["version"]
          parsed = Version(version)

          if not parsed.is_prerelease:
              raise SystemExit(
                  f"stereo branch must use a pre-release version, "
                  f"e.g. 2.0.0.dev1. Current version is: {version}"
              )

          print(f"Valid beta/pre-release version: {version}")
          PY

      - name: Validate release tag matches project version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from packaging.version import Version

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          project_version = Version(data["project"]["version"])
          tag_version = Version(os.environ["RELEASE_TAG"].removeprefix("v"))
          if tag_version != project_version:
              raise SystemExit(
                  f"Release tag {tag_version} does not match "
                  f"pyproject.toml version {project_version}"
              )
          print(f"Release tag matches project version: {project_version}")
          PY

      - name: Build source and wheel distributions
        run: |
          python -m build --sdist --wheel

      - name: Check package metadata
        run: |
          python -m twine check dist/*

      - name: Show built artifacts
        run: |
          ls -lh dist/

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish package to PyPI
    needs: build
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/stereo')
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/synkit

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
